<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutas-ProMaster | TV en Vivo</title>
    <!-- Solución al problema de contenido mixto (http) -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(31, 41, 55, 0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.8); }

        .seccion { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden font-sans">

    <!-- HEADER -->
    <header class="flex-shrink-0 z-40 bg-gray-900/95 backdrop-blur-md border-b border-gray-800 pt-6 pb-4 px-4 shadow-xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500">
                Frutas-ProMaster
            </h1>
            <span id="canal-actual" class="text-xs font-bold text-gray-400 bg-gray-800 px-3 py-1 rounded-full truncate max-w-[150px]">
                Selecciona un canal
            </span>
        </div>
    </header>

    <main class="flex-grow flex flex-col max-w-4xl mx-auto w-full p-4 gap-4 overflow-hidden relative pb-16">
        
        <!-- REPRODUCTOR -->
        <div class="flex-shrink-0">
            <div class="flex items-center gap-2 mb-2">
                <div id="indicador-vivo" class="w-3 h-3 bg-gray-600 rounded-full"></div>
                <h2 class="text-lg font-bold">Reproductor</h2>
            </div>
            <div class="w-full bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-700/50 relative aspect-video flex items-center justify-center">
                <video id="video-reproductor" class="w-full h-full object-contain" controls crossorigin playsinline></video>
            </div>
        </div>

        <!-- SELECTOR DE FUENTE (LOCAL VS PLUTO) -->
        <div class="flex-shrink-0 flex justify-center gap-3 border-t border-gray-800 pt-3 pb-1">
            <button id="btn-fuente-pluto" onclick="cambiarFuente('pluto')" class="flex-1 py-2 rounded-xl font-bold text-xs uppercase tracking-wider transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/20 border border-blue-500">
                Pluto TV
            </button>
            <button id="btn-fuente-local" onclick="cambiarFuente('local')" class="flex-1 py-2 rounded-xl font-bold text-xs uppercase tracking-wider transition-all bg-gray-800 text-gray-400 border border-gray-700">
                Mis Canales
            </button>
        </div>
        
        <!-- LISTA DE CANALES -->
        <div id="contenedor-canales" class="flex-grow overflow-y-auto space-y-2 pr-2 custom-scrollbar pb-4">
            <!-- Los canales se inyectan aquí -->
        </div>

    </main>

    <!-- CRÉDITOS DE AUTORÍA -->
    <div class="absolute bottom-[60px] w-full text-center z-30 pointer-events-none">
        <p class="text-[9px] text-gray-500/50 font-semibold tracking-widest uppercase shadow-black drop-shadow-md">
            © 2026 Juan Zamora | Creador Oficial
        </p>
    </div>

    <!-- MENÚ DE CATEGORÍAS ESTILO PROFESIONAL (PÍLDORAS) -->
    <nav class="absolute bottom-0 left-0 w-full z-40 bg-gray-900/95 backdrop-blur-xl border-t border-gray-800 pb-safe pt-3">
        <div id="menu-categorias" class="max-w-4xl mx-auto flex items-center gap-2 px-4 overflow-x-auto custom-scrollbar pb-3">
            <!-- Los botones (píldoras) se generan aquí -->
        </div>
    </nav>

    <script>
        const video = document.getElementById('video-reproductor');
        let hlsPlayer = null;
        let listaDeCanalesGlobal = []; 
        let categoriasGlobales = new Set(); 
        
        // ESTADOS DE LA APLICACIÓN
        let fuenteActiva = 'pluto'; // Inicia mostrando Pluto TV
        let categoriaActiva = 'Todos';

        // TUS ARCHIVOS M3U (AHORA CON IDENTIFICADOR DE TIPO)
        const archivosM3U = [
            { url: 'lista1.m3u', tipo: 'local' },
            { url: 'lista2.m3u8', tipo: 'local' },
            { url: 'https://raw.githubusercontent.com/BuddyChewChew/pluto/main/pluto_mx.m3u', tipo: 'pluto' }
        ];

        async function parsearM3U(archivo) {
            try {
                const respuesta = await fetch(archivo.url);
                if (!respuesta.ok) return []; 
                
                const texto = await respuesta.text();
                const lineas = texto.split('\n');
                const canales = [];
                let canalActual = {};

                for (let i = 0; i < lineas.length; i++) {
                    const linea = lineas[i].trim();
                    
                    if (linea.startsWith('#EXTINF:')) {
                        const logoMatch = linea.match(/tvg-logo="([^"]+)"/);
                        canalActual.logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/150?text=TV';
                        
                        const groupMatch = linea.match(/group-title="([^"]+)"/);
                        canalActual.categoria = groupMatch ? groupMatch[1] : 'Otros';
                        
                        const partes = linea.split(',');
                        canalActual.nombre = partes[partes.length - 1].trim();
                        
                        // Etiquetar si viene de pluto o de local
                        canalActual.fuente = archivo.tipo;
                    } 
                    else if (linea && !linea.startsWith('#')) {
                        canalActual.url = linea;
                        canales.push({...canalActual});
                        canalActual = {}; 
                    }
                }
                return canales;
            } catch (error) {
                console.error(`Error procesando el archivo ${archivo.url}:`, error);
                return [];
            }
        }

        async function inicializarApp() {
            const contenedor = document.getElementById('contenedor-canales');
            contenedor.innerHTML = '<p class="text-blue-400 text-center py-10 animate-pulse font-bold tracking-widest">CARGANDO SERVIDORES...</p>';

            for (const archivo of archivosM3U) {
                const canalesExtraidos = await parsearM3U(archivo);
                listaDeCanalesGlobal = listaDeCanalesGlobal.concat(canalesExtraidos);
            }

            // Asignar números
            listaDeCanalesGlobal.forEach((canal, index) => {
                canal.numero = index + 1;
            });

            aplicarFiltros();
        }

        // FUNCIÓN PARA CAMBIAR ENTRE PLUTO TV Y LOCALES
        function cambiarFuente(nuevaFuente) {
            fuenteActiva = nuevaFuente;
            categoriaActiva = 'Todos'; // Al cambiar de fuente, regresamos a "Todos"

            // Actualizar botones superiores
            const btnPluto = document.getElementById('btn-fuente-pluto');
            const btnLocal = document.getElementById('btn-fuente-local');
            const claseActiva = 'flex-1 py-2 rounded-xl font-bold text-xs uppercase tracking-wider transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/20 border border-blue-500';
            const claseInactiva = 'flex-1 py-2 rounded-xl font-bold text-xs uppercase tracking-wider transition-all bg-gray-800 text-gray-400 border border-gray-700';

            btnPluto.className = fuenteActiva === 'pluto' ? claseActiva : claseInactiva;
            btnLocal.className = fuenteActiva === 'local' ? claseActiva : claseInactiva;

            aplicarFiltros();
        }

        // FUNCIÓN CENTRAL PARA FILTRAR
        function aplicarFiltros() {
            // 1. Filtrar por fuente (Local o Pluto)
            let canalesFiltrados = listaDeCanalesGlobal.filter(c => c.fuente === fuenteActiva);

            // 2. Extraer las categorías solo de los canales visibles actualmente
            categoriasGlobales = new Set(['Todos']);
            canalesFiltrados.forEach(c => categoriasGlobales.add(c.categoria));

            // 3. Filtrar por categoría seleccionada
            if (categoriaActiva !== 'Todos') {
                canalesFiltrados = canalesFiltrados.filter(c => c.categoria === categoriaActiva);
            }

            renderizarMenuCategorias();
            renderizarCanales(canalesFiltrados);
        }

        function seleccionarCategoria(categoria) {
            categoriaActiva = categoria;
            aplicarFiltros();
        }

        // REDISEÑO: MENÚ DE PÍLDORAS ESTILO VIX/PLUTO
        function renderizarMenuCategorias() {
            const menu = document.getElementById('menu-categorias');
            menu.innerHTML = '';
            
            categoriasGlobales.forEach(categoria => {
                const esActivo = categoria === categoriaActiva;
                const clasesPildora = esActivo
                    ? 'whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold border border-blue-500 bg-blue-600 text-white shadow-md transition-all'
                    : 'whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold border border-gray-700 bg-gray-800 text-gray-300 hover:bg-gray-700 transition-all';
                
                const btnHtml = `
                    <button onclick="seleccionarCategoria('${categoria}')" class="${clasesPildora}">
                        ${categoria}
                    </button>
                `;
                menu.innerHTML += btnHtml;
            });
        }

        function renderizarCanales(canales) {
            const contenedor = document.getElementById('contenedor-canales');
            contenedor.innerHTML = ''; 

            if (canales.length === 0) {
                contenedor.innerHTML = '<p class="text-gray-400 text-center py-10 text-sm">No se encontraron canales en esta sección.</p>';
                return;
            }

            canales.forEach((canal) => {
                const tarjetaHtml = `
                    <div onclick="reproducirCanal('${canal.url}', '${canal.nombre}')" class="bg-gray-800/60 backdrop-blur-sm rounded-xl p-3 shadow-md border border-gray-700/50 cursor-pointer hover:border-blue-500/50 hover:bg-gray-700/80 transition-all flex items-center gap-3 group">
                        
                        <div class="flex-shrink-0 w-8 text-center font-black text-gray-500 group-hover:text-blue-400 transition-colors text-lg">
                            ${canal.numero}
                        </div>

                        <img src="${canal.logo}" alt="Logo" class="w-14 h-14 object-contain rounded-lg bg-gray-900 p-1 flex-shrink-0">
                        
                        <div class="flex flex-col flex-grow overflow-hidden">
                            <span class="font-bold text-sm truncate text-white group-hover:text-blue-400 transition-colors">${canal.nombre}</span>
                            <span class="text-[10px] text-gray-400 mt-0.5 uppercase tracking-wider">${canal.categoria}</span>
                        </div>
                        
                        <div class="flex-shrink-0 text-gray-500 group-hover:text-blue-400 transition-colors pr-2">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += tarjetaHtml;
            });
        }

        function reproducirCanal(url, nombre) {
            document.getElementById('canal-actual').innerText = nombre;
            const indicador = document.getElementById('indicador-vivo');
            
            indicador.classList.remove('bg-gray-600');
            indicador.classList.add('bg-red-500', 'animate-pulse');

            if (hlsPlayer) {
                hlsPlayer.destroy();
            }

            if (Hls.isSupported()) {
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // ARRANCAR LA APLICACIÓN
        inicializarApp();

    </script>
</body>
</html>
